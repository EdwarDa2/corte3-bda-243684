services:
  postgres:
    image: postgres:16-alpine
    container_name: vet-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema_corte3.sql:/docker-entrypoint-initdb.d/01_schema_corte3.sql
      - ./backend/01_procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql
      - ./backend/02_triggers.sql:/docker-entrypoint-initdb.d/03_triggers.sql
      - ./backend/03_views.sql:/docker-entrypoint-initdb.d/04_views.sql
      - ./backend/04_roles_y_permisos.sql:/docker-entrypoint-initdb.d/05_roles_y_permisos.sql
      - ./backend/05_rls.sql:/docker-entrypoint-initdb.d/06_rls.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${DB_USER} -d ${DB_NAME} -c 'SELECT 1 FROM vet_atiende_mascota LIMIT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    networks:
      - vet-net

  redis:
    image: redis:7-alpine
    container_name: vet-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vet-net

  api:
    build: ./api
    container_name: vet-api
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vet-net

volumes:
  pgdata:
  redisdata:

networks:
  vet-net:
    driver: bridge